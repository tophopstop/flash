<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
  #question { font-size: 1.2em; margin-bottom: 16px; }
  .option { display: block; width: 100%; text-align: left; padding: 10px; margin: 6px 0;
            border: 1px solid #888; border-radius: 6px; background: #f5f5f5; cursor: pointer; font-size: 1em; }
  .option:hover { background: #e8e8e8; }
  .option.correct { background: #c8f0c8; border-color: #2a8a2a; }
  .option.incorrect { background: #f0c8c8; border-color: #a82a2a; }
  #progress { color: #555; margin-bottom: 8px; }
  #result { font-size: 1.4em; }
  button#restart { margin-top: 16px; padding: 8px 16px; }
</style>
</head>
<body>
<div id="app">Loading...</div>

<script>
let questions = [];
let order = [];
let current = 0;
let correctCount = 0;
let answered = false;
let currentOptionOrder = [];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function render() {
  const app = document.getElementById('app');
  if (current >= order.length) {
    const pct = order.length ? Math.round((correctCount / order.length) * 100) : 0;
    app.innerHTML = `
      <div id="result">Score: ${correctCount} / ${order.length} (${pct}%)</div>
      <button id="restart">Restart</button>
    `;
    document.getElementById('restart').addEventListener('click', showSetup);
    return;
  }

  const q = questions[order[current]];
  const optionOrder = shuffle(q.options.map((_, i) => i));
  currentOptionOrder = optionOrder;
  app.innerHTML = `
    <div id="progress">Question ${current + 1} of ${order.length}</div>
    <div id="question">${q.question}</div>
    <div id="options"></div>
  `;
  const optionsDiv = document.getElementById('options');
  optionOrder.forEach((origIdx, displayIdx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = q.options[origIdx];
    btn.addEventListener('click', () => selectAnswer(displayIdx));
    optionsDiv.appendChild(btn);
  });
  answered = false;
}

function selectAnswer(displayIdx) {
  if (answered) return;
  answered = true;
  const q = questions[order[current]];
  const correctDisplayIdx = currentOptionOrder.indexOf(q.answer);
  const buttons = document.querySelectorAll('.option');
  buttons.forEach((btn, i) => {
    if (i === correctDisplayIdx) btn.classList.add('correct');
    else if (i === displayIdx) btn.classList.add('incorrect');
    btn.disabled = true;
  });
  if (displayIdx === correctDisplayIdx) correctCount++;
  setTimeout(() => {
    current++;
    render();
  }, 700);
}

function showSetup() {
  const app = document.getElementById('app');
  const total = questions.length;
  app.innerHTML = `
    <div id="setup">
      <label for="numQuestions">Number of questions (1-${total}):</label><br>
      <input type="number" id="numQuestions" min="1" max="${total}" value="${total}">
      <button id="beginBtn">Start</button>
      <div id="setupError" style="color:#a82a2a; margin-top:8px;"></div>
    </div>
  `;
  const input = document.getElementById('numQuestions');
  const beginBtn = document.getElementById('beginBtn');
  const errorDiv = document.getElementById('setupError');
  const begin = () => {
    let n = parseInt(input.value, 10);
    if (isNaN(n) || n < 1 || n > total) {
      errorDiv.textContent = `Please enter a number between 1 and ${total}.`;
      return;
    }
    start(n);
  };
  beginBtn.addEventListener('click', begin);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') begin();
  });
}

function start(numQuestions) {
  current = 0;
  correctCount = 0;
  const n = numQuestions || questions.length;
  order = shuffle(questions.map((_, i) => i)).slice(0, n);
  render();
}
